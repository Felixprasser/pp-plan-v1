<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pest Proof — Job Planner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0d14;--bg2:#111827;--bg3:#1e2535;--bg4:#252d3d;--ac:#16a34a;--blue:#2563eb;--red:#dc2626;--amber:#d97706;--purple:#7c3aed;--bd:rgba(255,255,255,0.07);--txt:#f1f5f9;--muted:rgba(241,245,249,0.45);--sb:240px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px;}
input,select,textarea,button{font-family:inherit;font-size:14px;-webkit-appearance:none;}

/* LAYOUT */
.sb{position:fixed;top:0;left:0;bottom:0;width:var(--sb);background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:200;transition:transform .25s;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:199;}
.sb-overlay.show{display:block;}
@media(max-width:960px){.sb{transform:translateX(calc(-1 * var(--sb)));}.sb.show{transform:translateX(0);}.main{margin-left:0!important;}}
.main{margin-left:var(--sb);}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bd);height:52px;display:flex;align-items:center;gap:8px;padding:0 16px;position:sticky;top:0;z-index:100;}
.tb-title{font-size:14px;font-weight:600;flex:1;}
.content{padding:16px;}

/* SIDEBAR */
.sb-brand{padding:16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;}
.sb-mark{width:32px;height:32px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;}
.sb-name{font-size:13px;font-weight:700;}
.sb-role{font-size:10px;color:var(--muted);}
.sb-body{flex:1;overflow-y:auto;padding:8px;}
.sb-sec{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;padding:10px 8px 4px;}
.nv{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:1px;}
.nv:hover{background:rgba(255,255,255,.05);color:var(--txt);}
.nv.on{background:rgba(22,163,74,.15);color:var(--ac);}
.nv .ic{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nv-badge{margin-left:auto;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:var(--red);color:#fff;}

/* PANELS */
.panel{display:none;}.panel.on{display:block;}

/* BUTTONS */
.btn{padding:7px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;transition:all .15s;}
.btn-g{background:var(--ac);color:#fff;}
.btn-g:hover{background:#15803d;}
.btn-gr{background:rgba(255,255,255,.08);color:var(--txt);border:1px solid var(--bd);}
.btn-gr:hover{background:rgba(255,255,255,.12);}
.btn-b{background:var(--blue);color:#fff;}
.btn-r{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.25);}
.btn-a{background:rgba(217,119,6,.15);color:#fbbf24;border:1px solid rgba(217,119,6,.25);}
.btn-p{background:rgba(124,58,237,.15);color:#c084fc;border:1px solid rgba(124,58,237,.25);}
.btn-sm{padding:5px 9px;font-size:11px;border-radius:6px;}

/* STAT CARDS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
@media(max-width:600px){.stats-row{grid-template-columns:repeat(2,1fr);}}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:12px;position:relative;overflow:hidden;}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.sc.g::before{background:var(--ac);}.sc.b::before{background:var(--blue);}.sc.a::before{background:var(--amber);}.sc.r::before{background:var(--red);}
.sc-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sc-v{font-size:22px;font-weight:700;}
.sc.g .sc-v{color:var(--ac);}.sc.b .sc-v{color:#60a5fa;}.sc.a .sc-v{color:#fbbf24;}.sc.r .sc-v{color:#f87171;}

/* WEEK NAV */
.week-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.week-label{flex:1;text-align:center;font-size:13px;font-weight:600;}
.week-arrow{padding:7px 12px;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:7px;color:var(--txt);cursor:pointer;font-size:13px;}
.week-arrow:hover{background:rgba(255,255,255,.1);}

/* ALERT BANNER */
.alert-banner{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);border-radius:8px;padding:10px 14px;font-size:13px;color:#f87171;margin-bottom:12px;line-height:1.8;display:none;}

/* TECH BOARDS - new collapsible layout */
.tech-board{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.tech-board-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.tech-board-hdr:hover{background:rgba(255,255,255,.03);}
.tech-av{width:38px;height:38px;border-radius:50%;background:rgba(22,163,74,.2);color:#4ade80;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tech-hdr-info{flex:1;}
.tech-hdr-name{font-size:14px;font-weight:700;}
.tech-hdr-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.tech-hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tech-hours{font-size:16px;font-weight:700;color:var(--ac);}
.tech-chevron{font-size:14px;color:var(--muted);transition:transform .2s;}
.tech-chevron.open{transform:rotate(180deg);}
.tech-body{display:none;border-top:1px solid var(--bd);}
.tech-body.open{display:block;}
.tech-actions-bar{display:flex;gap:8px;padding:10px 14px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--bd);flex-wrap:wrap;}

/* PROGRESS BAR */
.prog-bar{height:4px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;margin:4px 0 0;}
.prog-fill{height:100%;border-radius:2px;transition:width .4s;}
.prog-ok{background:var(--ac);}.prog-warn{background:var(--amber);}.prog-over{background:var(--red);}

/* DAY GROUP */
.day-group{border-bottom:1px solid var(--bd);}
.day-group:last-child{border-bottom:none;}
.day-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 6px;background:rgba(255,255,255,.02);}
.day-name{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.day-meta{display:flex;align-items:center;gap:8px;}
.day-count{font-size:11px;color:var(--ac);font-weight:600;}
.day-add{padding:3px 8px;font-size:10px;font-weight:700;border-radius:5px;background:rgba(22,163,74,.12);color:var(--ac);border:1px solid rgba(22,163,74,.2);cursor:pointer;}
.day-add:hover{background:rgba(22,163,74,.2);}

/* JOB ROWS */
.job-row{display:flex;align-items:center;gap:10px;padding:8px 14px;transition:background .15s;cursor:pointer;}
.job-row:hover{background:rgba(255,255,255,.03);}
.job-row.confirmed{border-left:3px solid var(--amber);}
.job-row.lunch{cursor:default;opacity:0.5;}
.job-row.lunch:hover{background:transparent;}
.jr-time{font-size:11px;font-weight:700;width:48px;flex-shrink:0;color:var(--muted);}
.jr-time.fixed{color:var(--amber);}
.jr-info{flex:1;min-width:0;}
.jr-co{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jr-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.jr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.jr-dur{font-size:11px;font-weight:700;color:var(--ac);}
.jr-more{padding:4px 8px;background:rgba(255,255,255,.06);border:1px solid var(--bd);border-radius:5px;font-size:11px;cursor:pointer;color:var(--muted);}
.jr-more:hover{background:rgba(255,255,255,.1);color:var(--txt);}
.empty-day{padding:10px 14px;font-size:12px;color:var(--muted);font-style:italic;}

/* CONTRACTS */
.ct-row{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg3);border-radius:9px;margin-bottom:5px;cursor:pointer;transition:background .15s;}
.ct-row:hover{background:var(--bg4);}
.ct-due{width:72px;flex-shrink:0;text-align:center;}
.ct-days{font-size:17px;font-weight:700;line-height:1;}
.ct-days.ov{color:#f87171;}.ct-days.sn{color:#fbbf24;}.ct-days.ok{color:#4ade80;}
.ct-dl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.ct-info{flex:1;min-width:0;}
.ct-co{font-size:13px;font-weight:600;}
.ct-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.ct-right{text-align:right;flex-shrink:0;}
.ct-h{font-size:13px;font-weight:700;color:var(--ac);}
.ct-fr{font-size:10px;color:var(--muted);}

/* FORMS */
.fld{margin-bottom:10px;}
.fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;}
.inp{width:100%;padding:9px 12px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid var(--bd);color:var(--txt);transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--ac);}
.inp option{background:#1e2535;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}

/* MODALS */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;padding:16px;overflow-y:auto;align-items:flex-start;justify-content:center;}
.mo.open{display:flex;}
.mdl{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;width:100%;max-width:500px;margin:auto;}
.mh{padding:15px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.mt{font-size:15px;font-weight:600;}
.mx{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:0 2px;}
.mb{padding:16px 18px;}
.mf{padding:12px 18px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:8px;}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.bg{background:rgba(22,163,74,.15);color:#4ade80;}
.bb{background:rgba(37,99,235,.15);color:#60a5fa;}
.ba{background:rgba(217,119,6,.15);color:#fbbf24;}
.br{background:rgba(220,38,38,.15);color:#f87171;}
.sync-flash{font-size:11px;font-weight:600;opacity:0;transition:opacity .4s;}
</style>
</head>
<body>

<!-- SIDEBAR OVERLAY (closes sidebar on mobile tap) -->
<div class="sb-overlay" id="sb-overlay" onclick="closeSB()"></div>

<!-- SIDEBAR -->
<div class="sb" id="sb">
  <div class="sb-brand">
    <div class="sb-mark">PP</div>
    <div><div class="sb-name">Job Planner</div><div class="sb-role">Marcus Webb</div></div>
  </div>
  <div class="sb-body">
    <div class="sb-sec">Schedule</div>
    <div class="nv on" id="nv-schedule" onclick="go('schedule')"><span class="ic">📅</span>Weekly schedule</div>
    <div class="nv" id="nv-contracts" onclick="go('contracts')"><span class="ic">📋</span>All contracts</div>
    <div class="nv" id="nv-alerts" onclick="go('alerts')"><span class="ic">🔔</span>Alerts<span class="nv-badge" id="nb-al" style="display:none">0</span></div>
    <div class="nv" id="nv-live" onclick="go('live')"><span class="ic">⚡</span>Live today</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="topbar">
    <button onclick="toggleSB()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px 6px;border-radius:6px;flex-shrink:0;">☰</button>
    <div class="tb-title" id="pg-title">Weekly schedule</div>
    <span class="sync-flash" id="sync-flash"></span>
    <button class="btn btn-gr" onclick="loadAll()" style="flex-shrink:0">⟳</button>
    <button class="btn btn-b" onclick="sendWeekToAll()" style="flex-shrink:0">📧 Send week</button>
    <button class="btn btn-g" id="auto-btn" onclick="autoScheduleAll()" style="flex-shrink:0">⚡ Auto-schedule</button>
  </div>

  <div class="content">

    <!-- SCHEDULE -->
    <div class="panel on" id="pn-schedule">
      <div class="alert-banner" id="alert-banner"></div>
      <div class="stats-row">
        <div class="sc g"><div class="sc-l">Jobs this week</div><div class="sc-v" id="st-jobs">—</div></div>
        <div class="sc b"><div class="sc-l">Hours scheduled</div><div class="sc-v" id="st-hrs">—</div></div>
        <div class="sc a"><div class="sc-l">Unscheduled</div><div class="sc-v" id="st-unsched">—</div></div>
        <div class="sc r"><div class="sc-l">Alerts</div><div class="sc-v" id="st-alerts">0</div></div>
      </div>
      <div class="week-nav">
        <button class="week-arrow" onclick="changeWeek(-1)">◀</button>
        <div class="week-label" id="week-label">Loading...</div>
        <button class="week-arrow" onclick="changeWeek(1)">▶</button>
      </div>
      <div id="sched-wrap"></div>
    </div>

    <!-- CONTRACTS -->
    <div class="panel" id="pn-contracts">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;">
        <select class="inp" style="width:150px" id="ct-tech-f" onchange="renderContracts()"><option value="">All techs</option></select>
        <select class="inp" style="width:140px" id="ct-due-f" onchange="renderContracts()"><option value="">All</option><option value="overdue">Overdue</option><option value="week">Due this week</option><option value="month">Due this month</option></select>
        <input class="inp" style="width:160px" id="ct-search" placeholder="Search..." oninput="renderContracts()">
        <span style="font-size:12px;color:var(--muted);margin-left:auto" id="ct-count"></span>
      </div>
      <div id="ct-list"></div>
    </div>

    <!-- ALERTS -->
    <div class="panel" id="pn-alerts">
      <div style="font-size:13px;color:var(--muted);margin-bottom:12px">Incomplete jobs and field notifications.</div>
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden"><div id="alerts-list"></div></div>
    </div>

    <!-- LIVE -->
    <div class="panel" id="pn-live">
      <div style="background:var(--bg2);border:1px solid var(--bd);border-radius:10px;overflow:hidden">
        <div style="padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;"><span style="font-size:13px;font-weight:600">⚡ Live today</span><button class="btn btn-gr btn-sm" onclick="loadLive()">⟳</button></div>
        <div id="live-content" style="padding:14px 16px;color:var(--muted)">Loading...</div>
      </div>
    </div>

  </div>
</div>

<!-- JOB DETAIL MODAL -->
<div class="mo" id="mo-job">
<div class="mdl">
  <div class="mh"><div class="mt" id="mo-job-title">Job</div><button class="mx" onclick="closeMo('mo-job')">×</button></div>
  <div class="mb" id="mo-job-body"></div>
  <div class="mf" id="mo-job-footer"></div>
</div></div>

<!-- REASSIGN MODAL -->
<div class="mo" id="mo-reassign">
<div class="mdl" style="max-width:380px">
  <div class="mh"><div class="mt">Reassign job</div><button class="mx" onclick="closeMo('mo-reassign')">×</button></div>
  <div class="mb">
    <div style="font-size:13px;color:var(--muted);margin-bottom:14px" id="reassign-desc"></div>
    <div class="fld"><label>Assign to</label><select id="ra-tech" class="inp"></select></div>
    <div class="fld"><label>New time</label><input id="ra-time" class="inp" type="time"></div>
  </div>
  <div class="mf"><button class="btn btn-gr" onclick="closeMo('mo-reassign')">Cancel</button><button class="btn btn-g" onclick="confirmReassign()">Reassign</button></div>
</div></div>

<!-- ADD JOB MODAL -->
<div class="mo" id="mo-addjob">
<div class="mdl" style="max-width:440px">
  <div class="mh"><div class="mt" id="mo-addjob-title">Add job</div><button class="mx" onclick="closeMo('mo-addjob')">×</button></div>
  <div class="mb">
    <div class="fld"><label>Client / company *</label>
      <input id="aj-company" class="inp" placeholder="Type to search..." oninput="filterAJCompany(this.value)" autocomplete="off">
      <div id="aj-suggestions" style="display:none;background:var(--bg3);border:1px solid var(--bd);border-radius:8px;margin-top:4px;max-height:180px;overflow-y:auto;"></div>
    </div>
    <div class="fld"><label>Address</label><input id="aj-address" class="inp" placeholder="Auto-filled from contract"></div>
    <div class="fg">
      <div class="fld"><label>Technician *</label><select id="aj-tech" class="inp"></select></div>
      <div class="fld"><label>Date *</label><input id="aj-date" class="inp" type="date"></div>
      <div class="fld"><label>Start time</label><input id="aj-time" class="inp" type="time" value="09:00"></div>
      <div class="fld"><label>Duration (hours)</label><input id="aj-dur" class="inp" type="number" step="0.5" min="0.5" value="1"></div>
    </div>
    <div class="fld"><label>Access notes</label><input id="aj-access" class="inp" placeholder="e.g. Key in lockbox"></div>
    <div class="fld"><label>Notes</label><textarea id="aj-notes" class="inp" rows="2"></textarea></div>
  </div>
  <div class="mf"><button class="btn btn-gr" onclick="closeMo('mo-addjob')">Cancel</button><button class="btn btn-g" onclick="saveAddedJob()">Add to schedule</button></div>
</div></div>

<!-- TECH PROFILE MODAL -->
<div class="mo" id="mo-tech">
<div class="mdl" style="max-width:520px">
  <div class="mh"><div class="mt" id="mo-tech-title">Technician</div><button class="mx" onclick="closeMo('mo-tech')">×</button></div>
  <div class="mb" id="mo-tech-body"></div>
  <div class="mf"><button class="btn btn-gr" onclick="closeMo('mo-tech')">Close</button></div>
</div></div>

<!-- SEND TIME MODAL (replaces window.prompt) -->
<div class="mo" id="mo-sendtime">
<div class="mdl" style="max-width:340px">
  <div class="mh"><div class="mt">Set time for this job</div><button class="mx" onclick="closeMo('mo-sendtime')">×</button></div>
  <div class="mb">
    <div style="font-size:13px;color:var(--muted);margin-bottom:12px" id="sendtime-desc"></div>
    <div class="fld"><label>Start time</label><input id="sendtime-val" class="inp" type="time"></div>
  </div>
  <div class="mf"><button class="btn btn-gr" onclick="closeMo('mo-sendtime')">Cancel</button><button class="btn btn-g" onclick="confirmSendTime()">Confirm</button></div>
</div></div>

<script>
var FB='https://pest-proof-4571d-default-rtdb.asia-southeast1.firebasedatabase.app';
function fbR(p,cb){fetch(FB+'/'+p+'.json').then(function(r){return r.json();}).then(function(d){cb(null,d);}).catch(function(e){cb(e,null);});}
function fbW(p,d,cb){fetch(FB+'/'+p+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json();}).then(function(x){if(cb)cb(null,x);}).catch(function(e){if(cb)cb(e);});}
function fbP(p,d,cb){fetch(FB+'/'+p+'.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(function(r){return r.json();}).then(function(x){if(cb)cb(null,x);}).catch(function(e){if(cb)cb(e);});}
function toArr(v){if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);return Object.keys(v).sort().map(function(k){return v[k];}).filter(Boolean);}

// ── STATE ─────────────────────────────────────────────────────────────
var EMP={},CONTRACTS={},SCHEDULES={},OUTCOMES=[],ALERTS_DATA=[];
var weekOffset=0;
var _reassignRef=null,_currentTechId=null,_sendTimeRef=null;
// Track which tech boards are expanded

// ── HELPERS ───────────────────────────────────────────────────────────
function fmtDate(s){if(!s)return'—';try{return new Date(s+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'});}catch(e){return s;}}
function daysUntil(s){if(!s)return 9999;return Math.ceil((new Date(s+'T00:00:00')-new Date())/864e5);}
function minsToTime(m){var h=Math.floor(m/60),mn=m%60;return('0'+h).slice(-2)+':'+('0'+mn).slice(-2);}
function timeToMins(t){if(!t)return 540;var p=t.match(/(\d+):(\d+)/);return p?parseInt(p[1])*60+parseInt(p[2]):540;}
function distKm(a,b,c,d){var R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;var x=Math.sin(dL/2)*Math.sin(dL/2)+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function driveMins(km){return Math.round(km*2.5+5);}
function dateStr(d){return d.toISOString().split('T')[0];}
function sync(m,e){var el=document.getElementById('sync-flash');if(!el)return;el.textContent=m;el.style.color=e?'#f87171':'#4ade80';el.style.opacity='1';clearTimeout(el._t);el._t=setTimeout(function(){el.style.opacity='0';},3500);}

function getWeekStart(off){var d=new Date();var mon=new Date(d);mon.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);mon.setHours(0,0,0,0);return mon;}
function getWeekDays(off){var mon=getWeekStart(off);var days=[];for(var i=0;i<5;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}return days;}

// ── NAVIGATION ───────────────────────────────────────────────────────
function toggleSB(){
  var sb=document.getElementById('sb');
  var ov=document.getElementById('sb-overlay');
  var isOpen=sb.classList.contains('show');
  if(isOpen){sb.classList.remove('show');ov.classList.remove('show');}
  else{sb.classList.add('show');ov.classList.add('show');}
}
function closeSB(){
  document.getElementById('sb').classList.remove('show');
  document.getElementById('sb-overlay').classList.remove('show');
}

function go(id){
  // Close sidebar on mobile
  closeSB();
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.nv').forEach(function(n){n.classList.remove('on');});
  var pn=document.getElementById('pn-'+id);if(pn)pn.classList.add('on');
  var nv=document.getElementById('nv-'+id);if(nv)nv.classList.add('on');
  var titles={schedule:'Weekly schedule',contracts:'All contracts',alerts:'Alerts',live:'Live today'};
  document.getElementById('pg-title').textContent=titles[id]||id;
  var ab=document.getElementById('auto-btn');if(ab)ab.style.display=id==='schedule'?'':'none';
  if(id==='contracts'){renderTechFilters();renderContracts();}
  if(id==='alerts')renderAlerts();
  if(id==='live')loadLive();
  window.scrollTo(0,0);
}

function openMo(id){document.getElementById(id).classList.add('open');}
function closeMo(id){document.getElementById(id).classList.remove('open');}

  function tick(){if(++done>=need){buildScheduleView();updateStats();renderTechFilters();}}

  fbR('pp_employees',function(err,d){
    if(!err&&d&&Object.keys(d).length>=Object.keys(SEED_EMPLOYEES).length){EMP=d;}
    else{EMP=SEED_EMPLOYEES;if(!err)fbW('pp_employees',SEED_EMPLOYEES,null);}
    tick();
  });
  fbR('pp_contracts',function(err,d){
    var sc=Object.keys(SEED_CONTRACTS).length;
    if(!err&&d&&Object.keys(d).length>=sc){CONTRACTS=d;}
    else{CONTRACTS=SEED_CONTRACTS;fbW('pp_contracts',SEED_CONTRACTS,null);}
    tick();
  });

  // Load SCHEDULES back from Firebase for each tech + current week
  // This is the critical fix — reload persisted schedules
  loadSchedulesFromFirebase();

  fbR('pp_job_outcomes',function(err,d){OUTCOMES=d?toArr(d).filter(Boolean):[];checkAlerts();});
  fbR('pp_planner_alerts',function(err,d){
    ALERTS_DATA=d?toArr(d).filter(Boolean):[];
    var nb=document.getElementById('nb-al');
    if(nb){nb.textContent=ALERTS_DATA.length;nb.style.display=ALERTS_DATA.length?'':'none';}
    document.getElementById('st-alerts').textContent=ALERTS_DATA.length;
  });
}

function loadSchedulesFromFirebase(){
  // Read schedules for all techs for current week from Firebase
  var days=getWeekDays(weekOffset);
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});
  if(!techs.length)return;

  var loaded=0,total=techs.length*days.length;
  function onLoad(){loaded++;if(loaded>=total){buildScheduleView();updateStats();}}

  techs.forEach(function(tech){
    var safeId=(tech.id||'').replace(/\W/g,'_');
    days.forEach(function(day){
      var ds=dateStr(day);
      fbR('pp_schedule_'+safeId+'_'+ds,function(err,data){
        if(!err&&data&&data.jobs&&data.jobs.length){
          if(!SCHEDULES[tech.id])SCHEDULES[tech.id]={};
          SCHEDULES[tech.id][ds]=data.jobs;
          // Auto-promote: if this is today's dated schedule,
          // also write to today path so tech app can read it
          var todayStr=new Date().toISOString().split('T')[0];
          if(ds===todayStr){
            fbW('pp_schedule_today_'+safeId,data,null);
          }
        }
        onLoad();
      });
    });
  });
}

function updateWeekLabel(){

  var label=days[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+days[4].toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});

// ── AUTO SCHEDULER ───────────────────────────────────────────────────
function autoScheduleAll(){
  var btn=document.getElementById('auto-btn');btn.textContent='Scheduling...';btn.disabled=true;
  document.getElementById('sched-wrap').innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">Building optimal schedules...</div>';

  var days=getWeekDays(weekOffset);
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});
  var allContracts=Object.values(CONTRACTS).filter(function(c){return c&&c.status==='active';});

  SCHEDULES={};
  techs.forEach(function(t){SCHEDULES[t.id]={};days.forEach(function(d){SCHEDULES[t.id][dateStr(d)]=[];});});

  // Schedule each day across ALL techs together
  days.forEach(function(day){
    scheduleDayAll(techs,day,allContracts);
  });

  // Save to Firebase
  var saved=0,total=techs.length*days.length;
  techs.forEach(function(tech){
    var safeId=(tech.id||'').replace(/\W/g,'_');
    days.forEach(function(day){
      var ds=dateStr(day);
      var payload={date:ds,techId:tech.id,techName:tech.name,jobs:SCHEDULES[tech.id][ds]||[],scheduledAt:new Date().toISOString()};
      fbW('pp_schedule_'+safeId+'_'+ds,payload,function(){
        saved++;
        if(saved>=total){
          sync('Schedules saved ✓');
          btn.textContent='⚡ Auto-schedule';btn.disabled=false;
          buildScheduleView();updateStats();
        }
      });
      var today=new Date().toISOString().split('T')[0];
      if(ds===today)fbW('pp_schedule_today_'+safeId,payload,null);
    });
  });

  buildScheduleView();updateStats();
}

var SUBURB_COORDS={
  'Southport':[-27.994,153.398],'Robina':[-28.073,153.380],'Hope Island':[-27.886,153.370],
  'Helensvale':[-27.930,153.347],'Coomera':[-27.860,153.358],'Nerang':[-28.001,153.339],
  'Surfers Paradise':[-28.002,153.432],'Broadbeach':[-28.032,153.431],'Bundall':[-28.004,153.410],
  'Molendinar':[-27.980,153.365],'Ashmore':[-28.010,153.370],'Arundel':[-27.950,153.355],
  'Labrador':[-27.965,153.400],'Main Beach':[-27.972,153.427],'Biggera Waters':[-27.957,153.388],
  'Runaway Bay':[-27.942,153.395],'Yatala':[-27.736,153.237],'Carrara':[-28.039,153.368],
  'Parkwood':[-28.055,153.361],'Varsity Lakes':[-28.070,153.390],'Mudgeeraba':[-28.072,153.359],
  'Burleigh Heads':[-28.085,153.455],'Palm Beach':[-28.119,153.479],'Coolangatta':[-28.167,153.541],
  'Currumbin':[-28.136,153.490],'Tugun':[-28.143,153.497],'Bilinga':[-28.162,153.505],
  'Oxenford':[-27.900,153.360],'Upper Coomera':[-27.880,153.340],'Mermaid Beach':[-28.046,153.440]
};

function getCoords(c){
  if(c.lat&&c.lng)return[c.lat,c.lng];
  return SUBURB_COORDS[c.suburb]||[-28.0,153.40];
}

function techCoords(tech){
  return SUBURB_COORDS[tech.suburb]||[-28.0,153.40];
}

// Returns minutes a tech is busy up to a given time
function techFreeAt(techId,ds,fromMins){
  var jobs=SCHEDULES[techId]&&SCHEDULES[techId][ds]||[];
  // Find the latest end time of any job before or at fromMins
  var latest=fromMins;
  jobs.forEach(function(j){if(j.endMins>latest)latest=j.endMins;});
  return latest;
}

// Find where a tech's last job ends (their current position + time)
function techStatus(techId,ds){
  var jobs=(SCHEDULES[techId]&&SCHEDULES[techId][ds])||[];
  var realJobs=jobs.filter(function(j){return!j.isLunch;});
  if(!realJobs.length){
    // At home
    var home=techCoords(EMP[techId]||{});
    return{lat:home[0],lng:home[1],freeMins:480,totalH:0};
  }
  var last=realJobs[realJobs.length-1];
  return{
    lat:last.lat||((SUBURB_COORDS[last.suburb]||[])[0]||-28.0),
    lng:last.lng||((SUBURB_COORDS[last.suburb]||[])[1]||153.40),
    freeMins:last.endMins,
    totalH:realJobs.reduce(function(a,j){return a+(j.durationH||0);},0)
  };
}

// Check if adding a job at time t for duration dur conflicts with existing confirmed jobs
function hasConflict(techId,ds,startMins,endMins){
  var jobs=(SCHEDULES[techId]&&SCHEDULES[techId][ds])||[];
  return jobs.some(function(j){
    if(j.isLunch)return false;
    return startMins<j.endMins+10&&endMins>j.startMins-10;
  });
}

// Add a job to a tech's schedule for a day
function addJobToSchedule(techId,ds,job){
  if(!SCHEDULES[techId])SCHEDULES[techId]={};
  if(!SCHEDULES[techId][ds])SCHEDULES[techId][ds]=[];
  SCHEDULES[techId][ds].push(job);
  SCHEDULES[techId][ds].sort(function(a,b){return a.startMins-b.startMins;});
}

// ── MAIN SCHEDULER: allocates ALL contracts for one day across all techs ──
function scheduleDayAll(techs,day,allContracts){
  var ds=dateStr(day);
  var dayNames=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
  var dow=dayNames[day.getDay()];
  var DAY_START=480,DAY_END=1020; // 8am-5pm

  // Find all contracts due this day
  var dueToday=allContracts.filter(function(c){
    if(!c.nextVisit&&!c.confirmedDay)return false;
    if(c.nextVisit===ds)return true;
    // confirmedDay: only if nextVisit falls in same week as ds
    if(c.confirmedDay&&c.confirmedDay.toLowerCase()===dow){
      var nv=new Date(c.nextVisit+'T12:00:00');
      var dayDt=new Date(ds+'T12:00:00');
      var wMon=new Date(dayDt);wMon.setDate(dayDt.getDate()-((dayDt.getDay()+6)%7));
      var wFri=new Date(wMon);wFri.setDate(wMon.getDate()+4);
      return nv>=wMon&&nv<=wFri;
    }
    return false;
  });

  if(!dueToday.length)return;

  // Separate confirmed-time and flexible
  var confirmed=dueToday.filter(function(c){return c.confirmedTime&&c.confirmedTime.trim();});
  var flexible=dueToday.filter(function(c){return!c.confirmedTime||!c.confirmedTime.trim();});

  // Sort confirmed by time
  confirmed.sort(function(a,b){return timeToMins(a.confirmedTime)-timeToMins(b.confirmedTime);});

  // STEP 1: Place confirmed-time jobs
  // Assign each to the nearest available tech at that time
  confirmed.forEach(function(c){
    var t=timeToMins(c.confirmedTime);
    var dur=Math.round((c.timeOnSite||1)*60);
    var cCoords=getCoords(c);

    // Find best tech: nearest to job location AND free at that time
    var bestTech=null,bestScore=Infinity;
    techs.forEach(function(tech){
      // Check if tech is free at this time
      if(hasConflict(tech.id,ds,t,t+dur))return;
      // Check day cap
      var status=techStatus(tech.id,ds);
      if(status.totalH+(c.timeOnSite||1)>9)return; // 9h max
      // Distance from tech's last location to this job
      var dist=distKm(status.lat,status.lng,cCoords[0],cCoords[1]);
      var travelMins=driveMins(dist);
      // Can they get there in time?
      if(status.freeMins+travelMins>t+15)return; // can't make it
      var score=dist;
      if(score<bestScore){bestScore=score;bestTech=tech;}
    });

    if(!bestTech){
      // No tech available — assign to least-loaded tech that is physically free
      techs.forEach(function(tech){
        if(hasConflict(tech.id,ds,t,t+dur))return;
        var status=techStatus(tech.id,ds);
        var score=status.totalH;
        if(score<bestScore){bestScore=score;bestTech=tech;}
      });
    }

    if(bestTech){
      addJobToSchedule(bestTech.id,ds,{
        id:'j_'+Date.now()+'_c_'+Math.random().toString(36).slice(2,5),
        contractId:c.id,company:c.company,suburb:c.suburb,address:c.address,
        phone:c.phone,access:c.access,ftype:c.ftype,freq:c.freq,
        lat:cCoords[0],lng:cCoords[1],
        startMins:t,endMins:t+dur,durationH:c.timeOnSite||1,
        confirmed:true,confirmedTime:c.confirmedTime,confirmedDay:c.confirmedDay||'',
        scheduledTime:minsToTime(t),status:'pending',priority:c.priority||'normal'
      });
    }
  });

  // STEP 2: Route flexible jobs
  // Use nearest-neighbour across ALL techs together
  // Each iteration: pick the unscheduled job that can be done earliest by any tech
  var remaining=flexible.slice();

  while(remaining.length){
    var bestJob=null,bestTech=null,bestStart=Infinity,bestDist=Infinity;

    remaining.forEach(function(c){
      var cCoords=getCoords(c);
      var dur=Math.round((c.timeOnSite||1)*60);

      techs.forEach(function(tech){
        var status=techStatus(tech.id,ds);
        if(status.totalH+(c.timeOnSite||1)>9)return; // max 9h/day

        var dist=distKm(status.lat,status.lng,cCoords[0],cCoords[1]);
        var travel=driveMins(dist);
        var start=Math.max(DAY_START,status.freeMins+travel);

        // Push past any confirmed job conflicts
        var iterations=0;
        while(iterations<15){
          iterations++;
          var blocked=false;
          var jobs=(SCHEDULES[tech.id]&&SCHEDULES[tech.id][ds])||[];
          for(var j=0;j<jobs.length;j++){
            if(start<jobs[j].endMins+10&&start+dur>jobs[j].startMins-10){
              start=jobs[j].endMins+travel+5;
              blocked=true;break;
            }
          }
          if(!blocked)break;
        }

        if(start+dur>DAY_END)return; // doesn't fit today

        // Score: earlier start wins; tiebreak by distance
        if(start<bestStart||(start===bestStart&&dist<bestDist)){
          bestStart=start;bestDist=dist;bestJob=c;bestTech=tech;
        }
      });
    });

    if(!bestJob||!bestTech)break;

    var dur=Math.round((bestJob.timeOnSite||1)*60);
    var cCoords=getCoords(bestJob);
    var status=techStatus(bestTech.id,ds);
    var dist=distKm(status.lat,status.lng,cCoords[0],cCoords[1]);
    var travel=driveMins(dist);

    // Insert lunch break if crossing midday
    var dayJobs=(SCHEDULES[bestTech.id]&&SCHEDULES[bestTech.id][ds])||[];
    var hasLunch=dayJobs.some(function(j){return j.isLunch;});
    if(!hasLunch&&bestStart>=720&&bestStart<750){bestStart=750;}
    if(!hasLunch&&bestStart>720&&!dayJobs.some(function(j){return j.isLunch;})){
      addJobToSchedule(bestTech.id,ds,{
        id:'lunch_'+bestTech.id,company:'Lunch break',startMins:720,endMins:750,
        scheduledTime:'12:00',durationH:0.5,isLunch:true,status:'break'
      });
    }

    addJobToSchedule(bestTech.id,ds,{
      id:'j_'+Date.now()+'_'+Math.random().toString(36).slice(2,5),
      contractId:bestJob.id,company:bestJob.company,suburb:bestJob.suburb,
      address:bestJob.address,phone:bestJob.phone,access:bestJob.access,
      ftype:bestJob.ftype,freq:bestJob.freq,
      lat:cCoords[0],lng:cCoords[1],
      startMins:bestStart,endMins:bestStart+dur,durationH:bestJob.timeOnSite||1,
      confirmed:false,driveFromPrev:travel,
      scheduledTime:minsToTime(bestStart),status:'pending',priority:bestJob.priority||'normal'
    });

    remaining.splice(remaining.indexOf(bestJob),1);
  }

  // Add lunch to any tech who has jobs but no lunch yet
  techs.forEach(function(tech){
    var dayJobs=(SCHEDULES[tech.id]&&SCHEDULES[tech.id][ds])||[];
    var hasLunch=dayJobs.some(function(j){return j.isLunch;});
    var hasJobs=dayJobs.some(function(j){return!j.isLunch;});
    if(hasJobs&&!hasLunch){
      addJobToSchedule(tech.id,ds,{
        id:'lunch_'+tech.id,company:'Lunch break',startMins:720,endMins:750,
        scheduledTime:'12:00',durationH:0.5,isLunch:true,status:'break'
      });
    }
  });
}

// Legacy scheduleDay kept for manual single-tech operations
function scheduleDay(tech,day,allContracts){
  scheduleDayAll([tech],day,allContracts);
  return SCHEDULES[tech.id]&&SCHEDULES[tech.id][dateStr(day)]||[];
}


// ── BUILD SCHEDULE VIEW ──────────────────────────────────────────────
function buildScheduleView(){
  updateWeekLabel();
  var wrap=document.getElementById('sched-wrap');if(!wrap)return;
  var days=getWeekDays(weekOffset);
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});

    var techSched=SCHEDULES[tech.id]||{};

      '<div class="prog-bar" style="width:140px"><div class="prog-fill '+pCls+'" style="width:'+Math.min(pct,100)+'%"></div></div></div>'+
      '<div class="tech-hdr-right">'+
        '<button class="btn btn-b btn-sm" onclick="event.stopPropagation();openTechDetail(\''+tech.id+'\')" style="flex-shrink:0">Profile</button>'+
        '<button class="btn btn-g btn-sm" onclick="event.stopPropagation();openAddJobForTech(\''+tech.id+'\')" style="flex-shrink:0">+ Add</button>'+
        '<span class="tech-chevron'+(isOpen?' open':'')+'" id="chev-'+tech.id+'">▾</span>'+
      '</div>';
    hdr.onclick=(function(tid){return function(){toggleTechBoard(tid);};})(tech.id);
    board.appendChild(hdr);

    // Body
    var body=document.createElement('div');body.className='tech-body'+(isOpen?' open':'');body.id='tb-'+tech.id;

    // No action bar needed - send buttons are on each day row

    // Days
    days.forEach(function(day){
      var ds=dateStr(day);
      var dayJobs=(techSched[ds]||[]);
      var realJobs=dayJobs.filter(function(j){return!j.isLunch;});
      var dayH=realJobs.reduce(function(a,j){return a+(j.durationH||0);},0);
      var dayName=day.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'});

      var dg=document.createElement('div');dg.className='day-group';

      var dhdr=document.createElement('div');dhdr.className='day-hdr';
      dhdr.innerHTML='<span class="day-name">'+dayName+'</span>'+
        '<div class="day-meta">'+
          (realJobs.length?'<span class="day-count">'+realJobs.length+' jobs · '+dayH.toFixed(1)+'h</span>':'<span style="font-size:11px;color:var(--muted)">No jobs</span>')+
          '<button class="day-add" onclick="openAddJobForDay(\''+tech.id+'\',\''+ds+'\')">+ Add</button>'+

        '</div>';
      dg.appendChild(dhdr);

      if(!dayJobs.length){
        var empty=document.createElement('div');empty.className='empty-day';empty.textContent='Rest day';
        dg.appendChild(empty);
      } else {
        dayJobs.forEach(function(job){
          var row=document.createElement('div');
          row.className='job-row'+(job.confirmed?' confirmed':'')+(job.isLunch?' lunch':'');
          var timeDiv=document.createElement('div');timeDiv.className='jr-time'+(job.confirmed?' fixed':'');
          timeDiv.innerHTML=job.scheduledTime||minsToTime(job.startMins);
          if(job.confirmed)timeDiv.innerHTML+='<div style="font-size:8px;color:var(--amber);margin-top:1px">FIXED</div>';
          var info=document.createElement('div');info.className='jr-info';
          if(job.isLunch){
            info.innerHTML='<div class="jr-co" style="color:var(--muted)">🍽 Lunch break</div>';
          } else {
            var priDot=job.priority==='high'?'<span style="color:#f87171;font-size:10px;margin-right:3px">●</span>':'';
            info.innerHTML='<div class="jr-co">'+priDot+job.company+'</div>'+
              '<div class="jr-meta">'+job.suburb+(job.driveFromPrev?' · 🚗 '+job.driveFromPrev+'min':'')+(job.access?' · 🔑 '+job.access:'')+'</div>';
          }
          var right=document.createElement('div');right.className='jr-right';
          if(!job.isLunch){
            var dur=document.createElement('div');dur.className='jr-dur';dur.textContent=job.durationH+'h';
            var more=document.createElement('button');more.className='jr-more';more.textContent='•••';
            more.onclick=(function(j,tid,ds2){return function(e){e.stopPropagation();openJobDetail(j,tid,ds2);};})(job,tech.id,ds);
            right.appendChild(dur);right.appendChild(more);
          }
          row.appendChild(timeDiv);row.appendChild(info);row.appendChild(right);
          if(!job.isLunch)row.onclick=(function(j,tid,ds2){return function(){openJobDetail(j,tid,ds2);};})(job,tech.id,ds);
          dg.appendChild(row);
        });
      }
      body.appendChild(dg);
    });

    board.appendChild(body);
    wrap.appendChild(board);
  });
}

function toggleTechBoard(techId){
  var body=document.getElementById('tb-'+techId);
  var chev=document.getElementById('chev-'+techId);
  if(!body)return;
  var isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  if(chev)chev.classList.toggle('open',!isOpen);
  EXPANDED[techId]=!isOpen;
}

// ── STATS ────────────────────────────────────────────────────────────
function updateStats(){
  var days=getWeekDays(weekOffset);
  var allJobs=[];
  Object.values(SCHEDULES).forEach(function(ts){days.forEach(function(d){allJobs=allJobs.concat((ts[dateStr(d)]||[]).filter(function(j){return!j.isLunch;}));});});
  var totalH=allJobs.reduce(function(a,j){return a+(j.durationH||0);},0);
  document.getElementById('st-jobs').textContent=allJobs.length||'—';
  document.getElementById('st-hrs').textContent=totalH?totalH.toFixed(1)+'h':'—';
  // Unscheduled = contracts due this week not in schedule
  var scheduledCos=new Set(allJobs.map(function(j){return j.company;}));
  var due=Object.values(CONTRACTS).filter(function(c){return c&&c.status==='active'&&days.some(function(d){return c.nextVisit===dateStr(d);});});
  var unsched=due.filter(function(c){return!scheduledCos.has(c.company);}).length;
  document.getElementById('st-unsched').textContent=unsched||'0';
}

function discardJob(job,techId,ds){
  if(!confirm('Discard '+job.company+' today? It stays in the contract list for next scheduling.'))return;
  if(SCHEDULES[techId]&&SCHEDULES[techId][ds])SCHEDULES[techId][ds]=SCHEDULES[techId][ds].filter(function(j){return j.id!==job.id;});
  saveDay(techId,ds);
  closeMo('mo-job');buildScheduleView();sync('Job removed from today');
}

function openReassign(job,fromTechId,ds){
  _reassignRef={job:job,fromTechId:fromTechId,ds:ds};
  document.getElementById('reassign-desc').textContent=job.company+' — '+job.suburb;
  var sel=document.getElementById('ra-tech');
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});
  sel.innerHTML=techs.map(function(t){return'<option value="'+t.id+'"'+(t.id===fromTechId?' selected':'')+'>'+t.name+'</option>';}).join('');
  document.getElementById('ra-time').value=job.scheduledTime||'09:00';
  openMo('mo-reassign');
}

function confirmReassign(){
  if(!_reassignRef)return;
  var toId=document.getElementById('ra-tech').value;
  var newTime=document.getElementById('ra-time').value;
  var job=_reassignRef.job,fromId=_reassignRef.fromTechId,ds=_reassignRef.ds;
  var newMins=timeToMins(newTime);
  var newEnd=newMins+Math.round((job.durationH||1)*60);
  // Conflict check
  var targetJobs=(SCHEDULES[toId]&&SCHEDULES[toId][ds])||[];
  var conflict=targetJobs.find(function(j){return j.confirmed&&j.startMins<newEnd+10&&j.endMins>newMins-10;});
  if(conflict){alert('Cannot schedule at '+newTime+' — conflicts with confirmed job: '+conflict.company+' at '+conflict.scheduledTime+'\n\nConfirmed jobs cannot be moved.');return;}
  // Remove from old tech
  if(SCHEDULES[fromId]&&SCHEDULES[fromId][ds])SCHEDULES[fromId][ds]=SCHEDULES[fromId][ds].filter(function(j){return j.id!==job.id;});
  // Add to new tech
  var updated=Object.assign({},job,{startMins:newMins,endMins:newEnd,scheduledTime:newTime});
  if(!SCHEDULES[toId])SCHEDULES[toId]={};
  if(!SCHEDULES[toId][ds])SCHEDULES[toId][ds]=[];
  SCHEDULES[toId][ds].push(updated);
  SCHEDULES[toId][ds].sort(function(a,b){return a.startMins-b.startMins;});
  saveDay(fromId,ds);saveDay(toId,ds);
  closeMo('mo-reassign');buildScheduleView();
  sync('Reassigned to '+(EMP[toId]?EMP[toId].name:'tech'));
}

// SEND TIME MODAL (replaces window.prompt)
function openSendTime(job,techId,ds){
  _sendTimeRef={job:job,techId:techId,ds:ds};
  document.getElementById('sendtime-desc').textContent='Setting time for '+job.company+' in '+(EMP[techId]?EMP[techId].name:'tech')+'\'s schedule.';
  document.getElementById('sendtime-val').value=job.scheduledTime||'09:00';
  openMo('mo-sendtime');
}

function confirmSendTime(){
  if(!_sendTimeRef)return;
  var newTime=document.getElementById('sendtime-val').value;
  var job=_sendTimeRef.job,techId=_sendTimeRef.techId,ds=_sendTimeRef.ds;
  var newMins=timeToMins(newTime);
  var newEnd=newMins+Math.round((job.durationH||1)*60);
  // Conflict check
  var dayJobs=(SCHEDULES[techId]&&SCHEDULES[techId][ds])||[];
  var conflict=dayJobs.find(function(j){return j.confirmed&&j.id!==job.id&&j.startMins<newEnd+10&&j.endMins>newMins-10;});
  if(conflict){alert('Cannot perform — conflicts with confirmed job:\n"'+conflict.company+'" at '+conflict.scheduledTime+'.\n\nConfirmed jobs cannot be moved.');return;}
  // Update time
  if(SCHEDULES[techId]&&SCHEDULES[techId][ds]){
    SCHEDULES[techId][ds]=SCHEDULES[techId][ds].map(function(j){
      if(j.id===job.id)return Object.assign({},j,{startMins:newMins,endMins:newEnd,scheduledTime:newTime});
      return j;
    }).sort(function(a,b){return a.startMins-b.startMins;});
  }
  // Save and push to tech
  var tech=EMP[techId];
  saveDay(techId,ds);
  // Push to today path for tech app
  var today=new Date().toISOString().split('T')[0];
  if(ds===today&&tech){
    var safeId=(techId||'').replace(/\W/g,'_');
    fbW('pp_schedule_today_'+safeId,{date:ds,techId:techId,techName:tech.name,jobs:SCHEDULES[techId][ds],sentAt:new Date().toISOString()},null);
  }
  closeMo('mo-sendtime');buildScheduleView();
  sync('Updated and saved'+(ds===new Date().toISOString().split('T')[0]?' — pushed to tech app':''));
}

// ── SAVE A SINGLE DAY TO FIREBASE ────────────────────────────────────
function saveDay(techId,ds){
  var tech=EMP[techId];if(!tech)return;
  var safeId=(techId||'').replace(/\W/g,'_');
  var jobs=(SCHEDULES[techId]&&SCHEDULES[techId][ds])||[];
  var payload={date:ds,techId:techId,techName:tech.name,jobs:jobs,savedAt:new Date().toISOString()};
  // Always write to dated path — tech app reads this directly
  fbW('pp_schedule_'+safeId+'_'+ds,payload,function(err){
    if(!err)sync('Saved — tech app will update within 30s');
  });
  // Also write today path when scheduling today
  var today=new Date().toISOString().split('T')[0];
  if(ds===today){
    fbW('pp_schedule_today_'+safeId,payload,null);
  }
}

// ── SEND TODAY'S SCHEDULE ────────────────────────────────────────────
function sendTodaySchedule(techId,ds){
  if(!techId)techId=_currentTechId;
  var tech=EMP[techId];if(!tech)return;
  if(!tech.email){alert('No email on file for '+tech.name+'.\nOpen their profile to add an email address.');return;}
  if(!ds)ds=new Date().toISOString().split('T')[0];
  var safeId=(techId||'').replace(/\W/g,'_');
  var dayLabel=new Date(ds+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
  fbR('pp_schedule_'+safeId+'_'+ds,function(err,data){
    var jobs=data&&data.jobs?data.jobs:((SCHEDULES[techId]&&SCHEDULES[techId][ds])||[]);
    var realJobs=jobs.filter(function(j){return!j.isLunch;});
    if(!realJobs.length){alert('No jobs scheduled for '+tech.name+' on '+dayLabel+'.\n\nRun Auto-schedule first, or add jobs manually.');return;}
    var subj='Your schedule for '+dayLabel+' — Pest Proof';
    var body='Hi '+tech.name.split(' ')[0]+',\n\nHere is your schedule for '+dayLabel+':\n\n';
    jobs.forEach(function(j){
      if(j.isLunch){body+='12:00  Lunch break (30 min)\n\n';return;}
      body+=(j.scheduledTime||'TBC')+'  '+j.company+'\n';
      if(j.address)body+='       '+j.address+'\n';
      if(j.access)body+='       Access: '+j.access+'\n';
      if(j.phone)body+='       Ph: '+j.phone+'\n';
      body+='       '+j.durationH+'h on site\n';
      if(j.driveFromPrev)body+='       (~'+j.driveFromPrev+' min drive)\n';
      body+='\n';
    });
    var totalH=realJobs.reduce(function(a,j){return a+(j.durationH||0);},0);
    body+='Total: '+realJobs.length+' jobs, '+totalH+'h\n\nHave a great day!\nMarcus\nPest Proof — 0450 515 987';
    window.location.href='mailto:'+tech.email+'?subject='+encodeURIComponent(subj)+'&body='+encodeURIComponent(body);
    sync('Email opened for '+tech.name);
    closeMo('mo-tech');
  });
}

function saveAddedJob(){
  var company=document.getElementById('aj-company').value.trim();
  var techId=document.getElementById('aj-tech').value;
  var date=document.getElementById('aj-date').value;
  var time=document.getElementById('aj-time').value;
  var dur=parseFloat(document.getElementById('aj-dur').value)||1;
  if(!company){alert('Company name required.');return;}
  if(!techId){alert('Select a technician.');return;}
  if(!date){alert('Select a date.');return;}
  var startMins=timeToMins(time);
  var endMins=startMins+Math.round(dur*60);
  // Conflict check
  var existing=(SCHEDULES[techId]&&SCHEDULES[techId][date])||[];
  var conflict=existing.find(function(j){return j.confirmed&&j.startMins<endMins+10&&j.endMins>startMins-10;});
  if(conflict){alert('Conflicts with confirmed job: '+conflict.company+' at '+conflict.scheduledTime);return;}
  var job={id:'manual_'+Date.now(),company:company,address:document.getElementById('aj-address').value,access:document.getElementById('aj-access').value,suburb:'',startMins:startMins,endMins:endMins,durationH:dur,scheduledTime:time,confirmed:false,notes:document.getElementById('aj-notes').value,status:'pending',manual:true};
  if(!SCHEDULES[techId])SCHEDULES[techId]={};
  if(!SCHEDULES[techId][date])SCHEDULES[techId][date]=[];
  SCHEDULES[techId][date].push(job);
  SCHEDULES[techId][date].sort(function(a,b){return a.startMins-b.startMins;});
  // Save to Firebase immediately
  saveDay(techId,date);
  // Push to today if it's today
  var today=new Date().toISOString().split('T')[0];
  if(date===today){
    var safeId=(techId||'').replace(/\W/g,'_');
    var tech=EMP[techId];
    if(tech)fbW('pp_schedule_today_'+safeId,{date:date,techId:techId,techName:tech.name,jobs:SCHEDULES[techId][date],sentAt:new Date().toISOString()},null);
  }
  closeMo('mo-addjob');buildScheduleView();
  sync('Job added and saved ✓');
}

function renderContracts(){
  var techF=(document.getElementById('ct-tech-f')||{}).value||'';
  var dueF=(document.getElementById('ct-due-f')||{}).value||'';
  var search=((document.getElementById('ct-search')||{}).value||'').toLowerCase();
  var el=document.getElementById('ct-list');if(!el)return;
  var arr=Object.values(CONTRACTS).filter(Boolean).filter(function(c){
    if(c.status!=='active')return false;
    if(techF&&c.tech!==techF)return false;
    if(search&&!c.company.toLowerCase().includes(search))return false;
    var d=daysUntil(c.nextVisit);
    if(dueF==='overdue'&&d>=0)return false;
    if(dueF==='week'&&(d<0||d>7))return false;
    if(dueF==='month'&&(d<0||d>31))return false;
    return true;
  }).sort(function(a,b){return daysUntil(a.nextVisit)-daysUntil(b.nextVisit);});
  var cc=document.getElementById('ct-count');if(cc)cc.textContent=arr.length+' contracts';
  if(!arr.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">No contracts match.</div>';return;}
  el.innerHTML='';
  arr.forEach(function(c){
    var d=daysUntil(c.nextVisit);var tech=EMP[c.tech];
    var dCls=d<0?'ov':d<=7?'sn':'ok';
    var dText=d<0?Math.abs(d)+'d late':d===0?'Today':d===1?'Tmrw':d+'d';
    var row=document.createElement('div');row.className='ct-row';
    row.innerHTML='<div class="ct-due"><div class="ct-days '+dCls+'">'+dText+'</div><div class="ct-dl">'+(d<0?'OVERDUE':d===0?'TODAY':'DUE')+'</div></div>'+

      '<div class="ct-right"><div class="ct-h">'+(c.timeOnSite||1)+'h</div><div class="ct-fr">'+c.freq+'x/yr</div></div>';
    row.onclick=(function(ct){return function(){openContractDetail(ct);};})(c);
    el.appendChild(row);
  });
}

  if(c.address)body+='<div style="font-size:13px;color:var(--muted);margin-bottom:6px">📍 '+c.address+'</div>';
  if(c.phone)body+='<div style="font-size:13px;color:var(--muted);margin-bottom:6px">📞 <a href="tel:'+c.phone+'" style="color:var(--ac)">'+c.phone+'</a></div>';
  if(c.access)body+='<div style="background:rgba(217,119,6,.1);border:1px solid rgba(217,119,6,.2);border-radius:7px;padding:8px 12px;font-size:12px;color:#fbbf24;margin-bottom:8px">🔑 '+c.access+'</div>';
  if(c.confirmedTime||c.confirmedDay)body+='<div style="background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.2);border-radius:7px;padding:8px 12px;font-size:12px;color:#60a5fa">⏰ Confirmed: '+(c.confirmedTime||'')+(c.confirmedDay?' on '+c.confirmedDay:'')+'</div>';
  document.getElementById('mo-job-body').innerHTML=body;
  var footer=document.getElementById('mo-job-footer');footer.innerHTML='';
  var closeBtn=document.createElement('button');closeBtn.className='btn btn-gr';closeBtn.textContent='Close';closeBtn.onclick=function(){closeMo('mo-job');};
  var schedBtn=document.createElement('button');schedBtn.className='btn btn-g';schedBtn.textContent='Schedule this job';
  schedBtn.onclick=(function(ct){return function(){closeMo('mo-job');openAddJobForDay(ct.tech,ct.nextVisit||new Date().toISOString().split('T')[0]);document.getElementById('aj-company').value=ct.company;selectAJCompany(ct.company,ct.id);};})(c);
  footer.appendChild(closeBtn);footer.appendChild(schedBtn);
  openMo('mo-job');
}

// ── ALERTS ────────────────────────────────────────────────────────────
function checkAlerts(){
  var today=new Date().toISOString().split('T')[0];
  var issues=OUTCOMES.filter(function(o){return o&&o.date===today&&o.outcome!=='completed'&&o.outcome!=='done';});
  var banner=document.getElementById('alert-banner');
  if(banner&&issues.length){
    banner.style.display='block';
    banner.innerHTML='<strong>⚠️ '+issues.length+' job'+(issues.length!==1?'s':'')+' need attention today:</strong><br>'+issues.map(function(o){var lbl={no_access:'No access',client_absent:'Client absent',aborted:'Aborted',partial:'Partial'};return '&nbsp;&nbsp;• '+o.company+' ('+o.techName+') — '+(lbl[o.outcome]||o.outcome)+(o.notes?' — "'+o.notes+'"':'');}).join('<br>');
  } else if(banner){banner.style.display='none';}
}

function renderAlerts(){
  var el=document.getElementById('alerts-list');if(!el)return;
  var all=ALERTS_DATA.concat(OUTCOMES.filter(function(o){return o&&o.outcome!=='completed'&&o.outcome!=='done';}));
  if(!all.length){el.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);">No alerts — all good.</div>';return;}
  el.innerHTML=all.map(function(a){return'<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid var(--bd);"><div style="width:7px;height:7px;border-radius:50%;background:#f87171;flex-shrink:0;margin-top:5px;"></div><div style="flex:1"><div style="font-size:13px;font-weight:500">'+(a.company||a.title||'Alert')+'</div><div style="font-size:11px;color:var(--muted)">'+(a.techName||'')+(a.outcome?' — '+a.outcome:'')+(a.notes?' — "'+a.notes+'"':'')+'</div></div><div style="font-size:10px;color:var(--muted)">'+fmtDate(a.date||a.ts)+'</div></div>';}).join('');
}

// ── LIVE TODAY ────────────────────────────────────────────────────────
function loadLive(){
  var el=document.getElementById('live-content');if(!el)return;
  var today=new Date().toISOString().split('T')[0];
  el.innerHTML='<div style="color:var(--muted)">Loading...</div>';
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});
  el.innerHTML='';
  techs.forEach(function(t){
    var safeId=(t.id||'').replace(/\W/g,'_');
    fbR('pp_schedule_today_'+safeId,function(err,data){
      var jobs=data&&data.date===today&&data.jobs?data.jobs:[];
      var done=jobs.filter(function(j){return!j.isLunch&&j.status&&j.status!=='pending';}).length;
      var total=jobs.filter(function(j){return!j.isLunch;}).length;
      var card=document.createElement('div');
      card.style.cssText='background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:10px;';
      card.innerHTML='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-size:14px;font-weight:700;">'+t.name+'</div><div style="font-size:12px;color:var(--muted);">'+done+'/'+total+' done</div></div>'+
        '<div style="height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;"><div style="height:100%;width:'+Math.round((done/Math.max(total,1))*100)+'%;background:var(--ac);border-radius:3px;"></div></div>';
      el.appendChild(card);
    });
  });
}

// ── INIT ─────────────────────────────────────────────────────────────

// ── SEND WEEK TO ALL TECHS ───────────────────────────────────────────
function sendWeekToAll(){
  var days=getWeekDays(weekOffset);
  var techs=Object.values(EMP).filter(function(e){return e&&e.role==='technician'&&e.status==='active';});
  var noEmail=techs.filter(function(t){return !t.email;});
  if(noEmail.length){
    if(!confirm(noEmail.map(function(t){return t.name;}).join(', ')+' have no email on file and will be skipped.\n\nSend to the rest?'))return;
  }
  var sent=0,skipped=0;
  techs.forEach(function(tech){
    if(!tech.email){skipped++;return;}
    // Build full week email
    var safeId=(tech.id||'').replace(/\W/g,'_');
    var weekLabel=days[0].toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+days[4].toLocaleDateString('en-AU',{day:'numeric',month:'short'});
    var body='Hi '+tech.name.split(' ')[0]+',\n\nHere is your schedule for the week of '+weekLabel+':\n\n';
    var totalJobs=0,totalH=0;
    days.forEach(function(day){
      var ds=day.toISOString().split('T')[0];
      var dayLabel=day.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'short'});
      var jobs=(SCHEDULES[tech.id]&&SCHEDULES[tech.id][ds])||[];
      var realJobs=jobs.filter(function(j){return!j.isLunch;});
      body+=dayLabel.toUpperCase()+'\n';
      if(!realJobs.length){body+='  Rest day\n\n';return;}
      realJobs.forEach(function(j){
        body+='  '+(j.scheduledTime||'TBC')+'  '+j.company+'\n';
        if(j.address)body+='         '+j.address+'\n';
        if(j.access)body+='         Access: '+j.access+'\n';
        body+='         '+j.durationH+'h on site'+(j.driveFromPrev?' (~'+j.driveFromPrev+'min drive)':'')+'\n';
      });
      var dayH=realJobs.reduce(function(a,j){return a+(j.durationH||0);},0);
      body+='  Day total: '+realJobs.length+' jobs, '+dayH+'h\n\n';
      totalJobs+=realJobs.length;totalH+=dayH;
    });
    body+='WEEK TOTAL: '+totalJobs+' jobs, '+totalH+'h\n\nHave a great week!\nMarcus\nPest Proof — 0450 515 987';
    // Open mailto (one per tech)
    setTimeout(function(){
      window.open('mailto:'+tech.email+'?subject='+encodeURIComponent('Your week schedule '+weekLabel+' — Pest Proof')+'&body='+encodeURIComponent(body));
    }, sent * 500); // stagger so browser doesn't block
    sent++;
  });
  sync('Opening emails for '+sent+' techs'+(skipped?' ('+skipped+' skipped — no email)':''));
}

window.addEventListener('load',function(){
  EMP=SEED_EMPLOYEES;
  CONTRACTS=SEED_CONTRACTS;
  Object.values(EMP).filter(function(e){return e&&e.role==='technician';}).forEach(function(e){EXPANDED[e.id]=true;});
  renderTechFilters();
  updateWeekLabel();
  loadAll();
  var ab=document.getElementById('auto-btn');if(ab)ab.style.display='';
  sync('107 contracts loaded — click Auto-schedule to build schedules');
});
